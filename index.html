<!DOCTYPE html>
<html lang="en">
<head>
    <!-- MOBILE META -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PMB AR Campus</title>
    
    <!-- SCRIPTS -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- SPLASH SCREEN MOBILE -->
    <div id="splash" class="splash">
        <div class="splash-content">
            <div class="logo">🏛️ PMB AR</div>
            <div class="spinner"></div>
            <p id="splashText">Mulai...</p>
        </div>
    </div>

    <!-- CONTROLS MOBILE -->
    <div id="topControls" class="top-controls">
        <div id="fpsCounter" class="fps">60 FPS</div>
        <button id="infoBtn" class="control-btn info-btn">ℹ️</button>
    </div>

    <div id="bottomControls" class="bottom-controls">
        <button id="stopAR" class="control-btn stop-btn">⏹️</button>
        <button id="fullscreen" class="control-btn">⛶</button>
        <button id="screenshot" class="control-btn">📸</button>
        <button id="sound" class="control-btn active">🔊</button>
    </div>

    <!-- INFO PANEL MOBILE -->
    <div id="infoPanel" class="info-panel">
        <div id="infoContent"></div>
        <button id="closeInfo" class="close-btn">✕</button>
    </div>

    <!-- AR SCENE -->
    <a-scene id="arScene" embedded arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false; sourceWidth:640; sourceHeight:480;">
        <a-marker type="natural-image" src="targets.mind">
            <!-- MODELS -->
            <a-entity gltf-model="url(Maryam.glb)" position="-0.5 0 -1.5" scale="0.6 0.6 0.6" 
                      class="interactive" interaksi-klik animation="property: rotation; to: 0 360 0; loop: true; dur: 15000"></a-entity>
            
            <a-entity gltf-model="url(Nabi.glb)" position="0.8 0 -1.5" scale="0.4 0.4 0.4" 
                      class="interactive" interaksi-klik animation="property: rotation; to: 360 0 0; loop: true; dur: 12000"></a-entity>
            
            <!-- LABEL -->
            <a-text value="👆 TAP\nuntuk PMB!" position="0 0.8 -1.8" color="#00ff88" align="center" scale="0.4 0.4 0.4"></a-text>
        </a-marker>
        
        <a-light type="ambient" color="#555" intensity="0.7"></a-light>
        <a-entity camera look-controls>
            <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactive"></a-entity>
        </a-entity>
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
